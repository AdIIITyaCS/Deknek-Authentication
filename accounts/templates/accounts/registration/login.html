{% extends 'accounts/base.html' %}

{% block title %}
  Login | Django Auth Site
{% endblock %}

{% block content %}
  <section class="card auth-card">
    <h2>Login</h2>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Login</button>
    </form>
    <p class="muted">
      No account yet? <a href="{% url 'signup' %}">Create one</a>.
    </p>
  </section>
{% endblock %}
